name: Create Issues Over API Test

on: 
  workflow_dispatch:

permissions:
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PROJECT_NUMBER: 56           # TO BE REPLACED
      ORGANIZATION: buerokratt
      FIELD_NAME: Status           # TO BE REPLACED
      FIELD_VALUE: "Ready"         # TO BE REPLACED

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Docker
        run: docker compose up -d

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npm install @playwright/test && npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: |
          npx playwright test tests/always-fail.test.js --workers=2 --reporter=json > playwright-report.json
        continue-on-error: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report.json
          retention-days: 30

      - name: Search for existing issues for failed tests
        if: always()
        id: search_issue
        run: |
          TEST_NAMES=$(jq -r '.suites[]?.specs[]? | select(.tests[]?.results[-1].status == "failed") | .title' playwright-report.json)
          echo "Searching for issues related to failed test: $TEST_NAMES"
          
          if [ -z "$TEST_NAMES" ]; then
            echo "No failed tests found."
            exit 0  # No action required if no failed tests
          fi

          ENCODED_TEST_NAMES=$(echo "$TEST_NAMES" | sed 's/ /%20/g')
          echo "Encoded test names: $ENCODED_TEST_NAMES"

          SEARCH_URL="https://api.github.com/search/issues?q=repo:buerokratt/GH-API-Test-1+is:issue+is:open+in:title+$ENCODED_TEST_NAMES"
          echo "GitHub API search URL: $SEARCH_URL"
          
          existing_issues=$(curl -s \
            -H "Authorization: token ${{ secrets.BYK_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "$SEARCH_URL")

          echo "API response: $existing_issues"

          issue_count=$(echo "$existing_issues" | jq '.total_count')

          if [ $? -ne 0 ]; then
            echo "Error parsing the API response with jq."
            exit 3
          fi
            
          echo "Found issues count: $issue_count"
          echo "::set-output name=issue_found::$issue_count"

      - name: Create new issue for failed test
        if: steps.search_issue.outputs.issue_found == '0'
        id: create_issue
        run: |
          TEST_NAMES=$(jq -r '.suites[]?.specs[]? | select(.tests[]?.results[-1].status == "failed") | .title' playwright-report.json)
          ERROR_DETAILS=$(jq -r '.suites[]?.specs[]?.tests[]? | select(.results[-1].status == "failed") | .results[-1].error.message' playwright-report.json)

          CLEAN_ERROR_DETAILS=$(echo "$ERROR_DETAILS" | sed 's/\x1b\[[0-9;]*m//g')
          
          echo "Creating issue for failed tests: $TEST_NAMES"
          echo "Error details (cleaned): $CLEAN_ERROR_DETAILS"

          if [ -z "$TEST_NAMES" ] || [ -z "$CLEAN_ERROR_DETAILS" ]; then
            echo "Test names or error details are missing, skipping issue creation."
            exit 0
          fi

          while IFS= read -r TEST_NAME; do
            echo "Creating issue for failed test: $TEST_NAME"

            JSON_PAYLOAD=$(jq -n \
              --arg title "[Playwright Test Failure]: $TEST_NAME" \
              --arg body "A test failed in buerokratt/TDD-Playwright.
          
          Details:
          Test: $TEST_NAME
          ```
          $CLEAN_ERROR_DETAILS
          ```" \
              '{
                title: $title,
                body: $body,
                labels: ["bug"]
              }')
            
            response=$(curl -X POST \
              -H "Authorization: token ${{ secrets.BYK_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/buerokratt/GH-API-Test-1/issues \
              -d "$JSON_PAYLOAD")

            echo "Raw API response: $response"

            ISSUE_ID=$(echo "$response" | jq -r '.id')
            ISSUE_NUMBER=$(echo "$response" | jq -r '.number')

            if [ "$ISSUE_ID" == "null" ] || [ -z "$ISSUE_ID" ]; then
              echo "Failed to create the issue. Response was: $response"
              exit 1
            fi

            echo "Created issue with number: $ISSUE_NUMBER"
            echo "::set-output name=issue_number::$ISSUE_NUMBER"
            echo "Created issue with ID: $ISSUE_ID"
            echo "::set-output name=issue_id::$ISSUE_ID"
          done <<< "$TEST_NAMES"

      - name: Get Issue Global ID
        id: get_issue_global_id
        run: |
          ISSUE_NUMBER="${{ steps.create_issue.outputs.issue_number }}"

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "ISSUE_NUMBER is empty. Exiting."
            exit 1
          fi

          echo "Fetching global ID for issue number $ISSUE_NUMBER..."

          response=$(curl -X POST \
            -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { repository(owner: \\\"buerokratt\\\", name: \\\"GH-API-Test-1\\\") { issue(number: $ISSUE_NUMBER) { id } } }\"}" \
            https://api.github.com/graphql)

          echo "Global ID response: $response"

          GLOBAL_ID=$(echo "$response" | jq -r '.data.repository.issue.id')

          if [ "$GLOBAL_ID" == "null" ] || [ -z "$GLOBAL_ID" ]; then
            echo "Failed to fetch the global ID. Response was: $response"
            exit 1
          fi

          echo "Issue Global ID: $GLOBAL_ID"
          echo "::set-output name=global_id::$GLOBAL_ID"

      - name: Get Project ID, Field ID, and Ready Option ID
        id: get_project_field_and_option_id
        run: |
          echo "Fetching project ID, field ID, and option ID for 'Ready'..."

          project_response=$(curl -X POST \
            -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { organization(login: \\\"$ORGANIZATION\\\") { projectV2(number: $PROJECT_NUMBER) { id fields(first: 20) { nodes { ... on ProjectV2SingleSelectField { id name options { id name } } } } } } }\"}" \
            https://api.github.com/graphql)

          echo "Project and fields response: $project_response"

          PROJECT_ID=$(echo "$project_response" | jq -r '.data.organization.projectV2.id')
          FIELD_ID=$(echo "$project_response" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "'"$FIELD_NAME"'") | .id')
          READY_OPTION_ID=$(echo "$project_response" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "'"$FIELD_NAME"'") | .options[] | select(.name == "Ready") | .id')

          if [ -z "$PROJECT_ID" ] || [ -z "$FIELD_ID" ] || [ -z "$READY_OPTION_ID" ]; then
            echo "Failed to retrieve Project ID, Field ID, or Ready Option ID. Exiting."
            exit 1
          fi

          echo "Project ID: $PROJECT_ID"
          echo "Field ID for '$FIELD_NAME': $FIELD_ID"
          echo "Ready Option ID: $READY_OPTION_ID"
          
          echo "::set-output name=project_id::$PROJECT_ID"
          echo "::set-output name=field_id::$FIELD_ID"
          echo "::set-output name=ready_option_id::$READY_OPTION_ID"

      - name: Add issue to Project V2 board
        if: steps.search_issue.outputs.issue_found == '0'
        run: |
          GLOBAL_ID=${{ steps.get_issue_global_id.outputs.global_id }}
          PROJECT_ID=${{ steps.get_project_field_and_option_id.outputs.project_id }}
          FIELD_ID=${{ steps.get_project_field_and_option_id.outputs.field_id }}
          READY_OPTION_ID=${{ steps.get_project_field_and_option_id.outputs.ready_option_id }}

          echo "Adding issue to Project V2 board..."
          
          project_item_response=$(curl -X POST \
            -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { addProjectV2ItemById(input: {projectId: \\\"$PROJECT_ID\\\", contentId: \\\"$GLOBAL_ID\\\"}) { item { id } } }\"}" \
            https://api.github.com/graphql)

          echo "Project item creation response: $project_item_response"

          ITEM_ID=$(echo "$project_item_response" | jq -r '.data.addProjectV2ItemById.item.id')
          
          if [ "$ITEM_ID" == "null" ] || [ -z "$ITEM_ID" ]; then
            echo "Failed to add the issue to the project. Response was: $project_item_response"
            exit 1
          fi
          
          echo "Item ID in Project V2: $ITEM_ID"

          update_field_response=$(curl -X POST \
            -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { updateProjectV2ItemFieldValue(input: {projectId: \\\"$PROJECT_ID\\\", itemId: \\\"$ITEM_ID\\\", fieldId: \\\"$FIELD_ID\\\", value: { singleSelectOptionId: \\\"$READY_OPTION_ID\\\" }}) { projectV2Item { id } } }\"}" \
            https://api.github.com/graphql)

          echo "Field update response: $update_field_response"

          UPDATED_ITEM_ID=$(echo "$update_field_response" | jq -r '.data.updateProjectV2ItemFieldValue.projectV2Item.id')

          if [ "$UPDATED_ITEM_ID" == "null" ] || [ -z "$UPDATED_ITEM_ID" ]; then
            echo "Failed to update the project item field. Response was: $update_field_response"
            exit 1
          fi

          echo "Successfully added issue to Project V2 board with updated field."
          echo "Project Item ID: $ITEM_ID"
