name: Create Issues Over API Test

on: 
  workflow_dispatch:

permissions:
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PROJECT_NUMBER: 56           # TO BE REPLACED
      ORGANIZATION: buerokratt
      FIELD_NAME: Status           # TO BE REPLACED
      FIELD_VALUE: "Ready"         # TO BE REPLACED

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Docker
        run: docker compose up -d

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npm install @playwright/test && npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: |
          npx playwright test tests/always-fail.test.js --workers=2 --reporter=json > playwright-report.json
        continue-on-error: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report.json
          retention-days: 30

      - name: Parse failed tests
        id: parse_tests
        run: |
          # Collect failed tests into an array
          FAILED_TESTS=$(jq -c '[.suites[]?.specs[]? | select(.tests[]?.results[-1].status == "failed") | {title: .title, error: .tests[]?.results[-1].error.message}]' playwright-report.json)
          
          echo "Failed tests: $FAILED_TESTS"

          # Save output to environment file for compatibility
          echo "FAILED_TESTS=$FAILED_TESTS" >> $GITHUB_ENV

      - name: Debug failed tests output
        run: |
          echo "Raw failed tests output:"
          echo "$FAILED_TESTS"

      - name: Process each failed test
        if: env.FAILED_TESTS != '[]'
        run: |
          echo "Parsing failed tests JSON array: $FAILED_TESTS"

          # Process each failed test entry
          echo "$FAILED_TESTS" | jq -c '.[]' | while IFS= read -r test; do
            TEST_NAME=$(echo "$test" | jq -r '.title')
            ERROR_DETAILS=$(echo "$test" | jq -r '.error' | sed 's/\x1b\[[0-9;]*m//g')  # Remove ANSI escape codes

            if [ -z "$TEST_NAME" ] || [ -z "$ERROR_DETAILS" ]; then
              echo "Error: Missing test name or error details. Skipping."
              continue
            fi

            echo "Checking for existing issues for failed test: $TEST_NAME"

            # Encode the test name for a GitHub API search
            ENCODED_TEST_NAME=$(jq -n --arg title "$TEST_NAME" '$title' | jq -sRr @uri)

            # Search for existing issues with the same title in the specified repository
            search_response=$(curl -s \
              -H "Authorization: token ${{ secrets.BYK_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/search/issues?q=repo:buerokratt/GH-API-Test-1+is:issue+is:open+in:title+[Playwright+Test+Failure]:+$ENCODED_TEST_NAME")

            issue_count=$(echo "$search_response" | jq -r '.total_count')

            if [ "$issue_count" -gt 0 ]; then
              echo "An open issue already exists for $TEST_NAME. Skipping issue creation."
              continue
            fi

            echo "Creating new issue for failed test: $TEST_NAME"

            # Create JSON payload for issue creation
            JSON_PAYLOAD=$(jq -n \
              --arg title "[Playwright Test Failure]: $TEST_NAME" \
              --arg body "A test failed in buerokratt/TDD-Playwright.\n\nDetails:\nTest: $TEST_NAME\n$ERROR_DETAILS" \
              '{
                title: $title,
                body: $body,
                labels: ["bug"]
              }')

            # Create issue
            response=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.BYK_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "$JSON_PAYLOAD" \
              https://api.github.com/repos/buerokratt/GH-API-Test-1/issues)

            ISSUE_ID=$(echo "$response" | jq -r '.id')
            ISSUE_NUMBER=$(echo "$response" | jq -r '.number')

            if [ "$ISSUE_ID" == "null" ] || [ -z "$ISSUE_ID" ]; then
              echo "Failed to create issue for $TEST_NAME. Response: $response"
              continue
            fi

            echo "Created issue #$ISSUE_NUMBER for failed test: $TEST_NAME"

            # Get the global ID of the issue for project assignment
            issue_id_response=$(curl -s -X POST \
              -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"query { repository(owner: \\\"buerokratt\\\", name: \\\"GH-API-Test-1\\\") { issue(number: $ISSUE_NUMBER) { id } } }\"}" \
              https://api.github.com/graphql)

            GLOBAL_ID=$(echo "$issue_id_response" | jq -r '.data.repository.issue.id')

            if [ "$GLOBAL_ID" == "null" ] || [ -z "$GLOBAL_ID" ]; then
              echo "Failed to get the global ID for issue #$ISSUE_NUMBER."
              continue
            fi

            # Add issue to project board
            project_item_response=$(curl -s -X POST \
              -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { addProjectV2ItemById(input: {projectId: \\\"${{ steps.get_project_field_and_option_id.outputs.project_id }}\\\", contentId: \\\"$GLOBAL_ID\\\"}) { item { id } } }\"}" \
              https://api.github.com/graphql)

            ITEM_ID=$(echo "$project_item_response" | jq -r '.data.addProjectV2ItemById.item.id')

            if [ "$ITEM_ID" == "null" ] || [ -z "$ITEM_ID" ]; then
              echo "Failed to add the issue to the project board for issue #$ISSUE_NUMBER."
              continue
            fi

            # Update field to "Ready"
            update_field_response=$(curl -s -X POST \
              -H "Authorization: bearer ${{ secrets.BYK_PAT }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { updateProjectV2ItemFieldValue(input: {projectId: \\\"${{ steps.get_project_field_and_option_id.outputs.project_id }}\\\", itemId: \\\"$ITEM_ID\\\", fieldId: \\\"${{ steps.get_project_field_and_option_id.outputs.field_id }}\\\", value: { singleSelectOptionId: \\\"${{ steps.get_project_field_and_option_id.outputs.ready_option_id }}\\\" }}) { projectV2Item { id } } }\"}" \
              https://api.github.com/graphql)

            echo "Processed test failure: $TEST_NAME"
          done
