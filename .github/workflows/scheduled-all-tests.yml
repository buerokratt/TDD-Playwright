name: Scheduled Weekday Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ENV: test

on:
  schedule:
    # Weekdays at 03:30 UTC (06:30 in summer EEST, 05:30 in winter EET)
    - cron: "30 3 * * 1-5"
  workflow_dispatch:

jobs:
  run_all_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run all regular projects
        shell: bash
        run: |
          set -euo pipefail
          npx playwright test --project smoke --project flow --project tests

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: scheduled-all-tests-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
